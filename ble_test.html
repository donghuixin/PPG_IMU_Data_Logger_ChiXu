<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPG/IMU/ECG 蓝牙采集测试控制台</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .toolbar { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: white; background: #007bff; }
        button:hover:not(:disabled) { background: #0056b3; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.danger { background: #dc3545; }
        button.danger:hover:not(:disabled) { background: #b02a37; }
        button.success { background: #28a745; }
        button.success:hover:not(:disabled) { background: #218838; }
        
        .status { margin-left: auto; font-weight: bold; padding: 5px 12px; border-radius: 20px; background: #e9ecef; color: #6c757d; }
        .status.connected { background: #d4edda; color: #155724; }
        
        input[type="text"] { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; flex-grow: 1; }
        
        .console-container { display: flex; flex-direction: column; gap: 10px; }
        .console-header { display: flex; justify-content: space-between; align-items: center; }
        .console-header h3 { margin: 0; font-size: 16px; color: #555; }
        
        .console-box { background: #1e1e1e; height: 450px; overflow-y: auto; padding: 15px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
        .log-time { color: #888; font-size: 12px; user-select: none; }
        .log-info { color: #cccccc; }
        .log-tx { color: #4dabf7; font-weight: bold; }
        .log-rx { color: #69db7c; }
        .log-err { color: #ff6b6b; font-weight: bold; }
        .log-at { color: #fcc419; }
    </style>
</head>
<body>

<div class="container">
    <h1>蓝牙设备测试控制台 (适配 RF-BM-BG22A)</h1>
    
    <div class="toolbar">
        <button id="connectBtn" class="success">🔍 扫描附近所有BLE设备</button>
        <button id="disconnectBtn" class="danger" disabled>🔌 断开连接</button>
        <span class="status" id="statusBadge">未连接</span>
    </div>
    
    <div class="toolbar" style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
        <input type="text" id="filenameInput" placeholder="输入采集文件夹名 (例如: test_data_01)" style="max-width: 250px;">
        <button id="startBtn" disabled>▶️ 发送 Start 采集</button>
        <button id="stopBtn" class="danger" disabled>⏹️ 发送 Stop 停止</button>
        <button id="resetBtn" class="danger" disabled>🔄 发送 Reset 复位</button>
    </div>

    <div class="toolbar" style="background-color: #ffe8cc; border: 1px solid #ffd8a8; padding: 15px; border-radius: 8px;">
        <span style="font-size: 14px; font-weight: bold; color: #d9480f; margin-right: 10px;">⚠️ 模块底层控制(AT通道):</span>
        <button id="atExitBtn" disabled style="background-color: #fd7e14;">退出AT模式 (AT+EXIT)</button>
        <button id="atStatusBtn" disabled style="background-color: #fd7e14;">开启状态显示 (AT+STATUS=1)</button>
        <button id="atRestartBtn" disabled style="background-color: #fd7e14;">软重启蓝牙模块 (AT+RESTART)</button>
    </div>

    <div class="console-container">
        <div class="console-header">
            <h3>串口接收与发送日志</h3>
            <button id="clearConsoleBtn" style="padding: 6px 12px; font-size: 12px; background: #6c757d;">🗑️ 清空屏幕</button>
        </div>
        <div class="console-box" id="consoleBox"></div>
        
        <div class="toolbar" style="margin-top: 5px; margin-bottom: 0;">
            <input type="text" id="customCmdInput" placeholder="默认发往透传通道 (按回车发送)">
            <button id="sendCustomBtn" disabled>发送至 STM32</button>
        </div>
    </div>
</div>

<script>
    const UART_SERVICE_UUIDS = [
        0xFFE0,                                  
        0xFFF0,                                  
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e',  
        '49535343-fe7d-4ae5-8fa9-9fafd205e455'   
    ];

    let bluetoothDevice;
    let rxCharacteristic;
    let txCharacteristic;
    let atCharacteristic; // 新增：保存专属 AT 指令特征值

    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusBadge = document.getElementById('statusBadge');
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    const atExitBtn = document.getElementById('atExitBtn');
    const atStatusBtn = document.getElementById('atStatusBtn');
    const atRestartBtn = document.getElementById('atRestartBtn');
    
    const filenameInput = document.getElementById('filenameInput');
    const customCmdInput = document.getElementById('customCmdInput');
    const sendCustomBtn = document.getElementById('sendCustomBtn');
    const clearConsoleBtn = document.getElementById('clearConsoleBtn');
    const consoleBox = document.getElementById('consoleBox');

    function log(message, type = 'info') {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits: 3 });
        div.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${escapeHtml(message)}</span>`;
        consoleBox.appendChild(div);
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function escapeHtml(unsafe) {
        return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function updateUI(connected, deviceName = '') {
        connectBtn.disabled = connected;
        disconnectBtn.disabled = !connected;
        startBtn.disabled = !connected;
        stopBtn.disabled = !connected;
        resetBtn.disabled = !connected;
        sendCustomBtn.disabled = !connected;
        customCmdInput.disabled = !connected;
        filenameInput.disabled = !connected;
        
        atExitBtn.disabled = !connected;
        atStatusBtn.disabled = !connected;
        atRestartBtn.disabled = !connected;

        if (connected) {
            statusBadge.textContent = `已连接: ${deviceName}`;
            statusBadge.classList.add('connected');
        } else {
            statusBadge.textContent = '未连接';
            statusBadge.classList.remove('connected');
        }
    }

    clearConsoleBtn.addEventListener('click', () => {
        consoleBox.innerHTML = '';
        log('控制台已清空', 'info');
    });

    connectBtn.addEventListener('click', async () => {
        if (!navigator.bluetooth) {
            log('错误: 当前浏览器不支持 Web Bluetooth API。请使用 Chrome 或 Edge。', 'err');
            return;
        }

        try {
            log('正在请求蓝牙设备...', 'info');
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: UART_SERVICE_UUIDS
            });

            const deviceName = bluetoothDevice.name || '未知名称设备';
            log(`选定设备: ${deviceName} (${bluetoothDevice.id})`, 'info');
            
            bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

            const server = await bluetoothDevice.gatt.connect();
            let uartService = null;
            
            for (const uuid of UART_SERVICE_UUIDS) {
                try {
                    uartService = await server.getPrimaryService(uuid);
                    if (uartService) break;
                } catch (e) {}
            }

            if (!uartService) throw new Error('设备不支持预设的透传 UART 服务。');

            const characteristics = await uartService.getCharacteristics();
            rxCharacteristic = null;
            txCharacteristic = null;
            atCharacteristic = null;

            // 【核心修复】：智能分配数据通道与指令通道
            for (const char of characteristics) {
                const uuidStr = char.uuid.toLowerCase();

                // 1. 过滤掉专属 AT 指令通道 (0004)
                if (uuidStr.includes('0004') || uuidStr.includes('6e400004')) {
                    atCharacteristic = char;
                    log(`发现专属 AT 指令通道: ${char.uuid}`, 'at');
                    continue; // 必须跳过，防止污染数据透传通道
                }

                // 2. 绑定剩余的透传读写通道
                if (char.properties.write || char.properties.writeWithoutResponse) {
                    txCharacteristic = char;
                }
                if (char.properties.notify || char.properties.indicate) {
                    rxCharacteristic = char;
                }
            }

            if (!txCharacteristic || !rxCharacteristic) throw new Error('未找到完整的读写特征值');

            // 订阅透传接收
            await rxCharacteristic.startNotifications();
            rxCharacteristic.addEventListener('characteristicvaluechanged', handleDataReceived);

            // 订阅AT通道的返回值(如果存在)
            if (atCharacteristic && (atCharacteristic.properties.notify || atCharacteristic.properties.indicate)) {
                await atCharacteristic.startNotifications();
                atCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                    const text = new TextDecoder('utf-8').decode(e.target.value);
                    log(`AT反馈: ${text.trim()}`, 'at');
                });
            }

            log(`✅ 蓝牙连接成功！`, 'success');
            updateUI(true, deviceName);

        } catch (error) {
            log(`连接失败: ${error.message}`, 'err');
            updateUI(false);
        }
    });

    function onDisconnected(event) {
        log(`❌ 蓝牙已断开连接`, 'err');
        updateUI(false);
    }

    disconnectBtn.addEventListener('click', () => {
        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
            bluetoothDevice.gatt.disconnect();
        }
    });

    function handleDataReceived(event) {
        const text = new TextDecoder('utf-8').decode(event.target.value);
        log(`RX (STM32): ${text}`, 'rx');
    }

    // 【核心修复】：区分发送给 STM32 还是发给 蓝牙模块(AT)
    async function sendData(dataString, isAtCmd = false) {
        let targetChar = txCharacteristic;

        if (isAtCmd) {
            if (atCharacteristic) {
                targetChar = atCharacteristic; // 直接发往专属 0004 通道
            } else {
                // 若由于使用其他服务(如FFF0)没有0004，则通过主通道发 +++ 模拟进入指令模式
                log(`[无专属AT通道] 模拟发送 +++`, 'at');
                const enterAtMode = new TextEncoder().encode('+++');
                await (txCharacteristic.properties.writeWithoutResponse ? 
                    txCharacteristic.writeValueWithoutResponse(enterAtMode) : 
                    txCharacteristic.writeValueWithResponse(enterAtMode));
                await new Promise(r => setTimeout(r, 200)); 
            }
        }

        if (!targetChar) return log('错误: 无法发送，未找到写入特征值', 'err');
        
        try {
            const data = new TextEncoder().encode(dataString);
            if (targetChar.properties.writeWithoutResponse) {
                await targetChar.writeValueWithoutResponse(data);
            } else {
                await targetChar.writeValueWithResponse(data);
            }
            
            const logMsg = dataString.replace(/\r/g, '\\r').replace(/\n/g, '\\n');
            if (isAtCmd) {
                log(`[TX -> 模块(AT)]: ${logMsg}`, 'at');
            } else {
                log(`[TX -> STM32]: ${logMsg}`, 'tx');
            }
        } catch (error) {
            log(`发送失败: ${error.message}`, 'err');
        }
    }

    // --- STM32 透传指令交互 ---
    startBtn.addEventListener('click', async () => {
        const filename = filenameInput.value.trim() || 'test_data';
        log('>>> 发送 Start 流程至 STM32 <<<', 'info');
        await sendData('start\r\n');
        setTimeout(async () => { await sendData(filename + '\r\n'); }, 300);
    });

    stopBtn.addEventListener('click', async () => await sendData('stop\r\n'));
    resetBtn.addEventListener('click', async () => await sendData('reset\r\n'));
    
    sendCustomBtn.addEventListener('click', async () => {
        if (customCmdInput.value) {
            await sendData(customCmdInput.value + '\r\n');
            customCmdInput.value = ''; 
        }
    });

    customCmdInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendCustomBtn.click();
    });

    // --- 蓝牙底层 AT 管理 ---
    atExitBtn.addEventListener('click', async () => await sendData('AT+EXIT\r\n', true));
    atStatusBtn.addEventListener('click', async () => await sendData('AT+STATUS=1\r\n', true));
    atRestartBtn.addEventListener('click', async () => await sendData('AT+RESTART\r\n', true));

</script>
</body>
</html>
